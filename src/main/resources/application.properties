server.port=8080

# ==========================================
# Configuração do MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/chavesrfid?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
